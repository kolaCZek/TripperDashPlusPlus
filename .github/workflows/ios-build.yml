name: iOS build

# Build-only sanity check: does the app still compile?
# Runs on every push. The app is a UIKit/MapKit/VideoToolbox iOS target,
# so it must build on a macOS runner with Xcode — it cannot be built on
# Linux. No code signing (simulator build), no tests (there is no test
# target yet), just `xcodebuild build`.
#
# Only `push` is wired up (not `pull_request`): a push run's check is
# attached to the head commit, so it already surfaces on any PR for that
# commit — adding a pull_request trigger would just double-run the same
# SHA and burn macOS minutes.

on:
  push:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: xcodebuild (iOS Simulator)
    runs-on: macos-15
    timeout-minutes: 30

    env:
      PROJECT: TripperDashPP/TripperDashPP.xcodeproj
      SCHEME: TripperDashPP

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Show available simulators
        run: xcrun simctl list devicetypes | grep -i iphone || true

      - name: Resolve an iOS Simulator destination
        id: dest
        run: |
          # Pick a generic iOS Simulator destination for the build. Using a
          # generic destination avoids pinning to a runtime/device that the
          # runner image may drop in a future update.
          echo "destination=generic/platform=iOS Simulator" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "${{ steps.dest.outputs.destination }}" \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
